<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}WhatsApp AI Dashboard{% endblock %}
    </title>

    <!-- CSS -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/variables.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/base.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/layout.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/sidebar.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/navbar.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/settings.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/workflows.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/cards.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/animations.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/responsive.css') }}">

    <script defer
            src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app-layout">

    {% include 'partials/sidebar.html' %}
    <button class="sidebar-backdrop" id="sidebarBackdrop" type="button" aria-label="Close sidebar"></button>

    <div class="main-content">

        {% include 'partials/navbar.html' %}

        <main>

            {% block content %}
            {% endblock %}

        </main>

    </div>

</div>

<script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/settings.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/conversations.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/ai_assistant.js') }}"></script>

</body>

</html>
