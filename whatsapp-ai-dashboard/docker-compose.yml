services:
  api:
    build: .
    command: sh -c "npx prisma migrate deploy && node src/server.js"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/proximity_loyalty?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    networks:
      - proximity-net

  whatsapp-worker:
    build: .
    command: node src/workers/whatsappWorker.js
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/proximity_loyalty?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_started
    networks:
      - proximity-net

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proximity_loyalty
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proximity_loyalty"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - proximity-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - proximity-net

volumes:
  postgres-data:

networks:
  proximity-net:
    driver: bridge
